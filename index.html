<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Galaktik Macera Görev Listesi - Sürüm 4.1</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #03060d; color: #ffffff; margin: 0; padding: 0; min-height: 100vh;
        display: flex; justify-content: center; align-items: flex-start;
        padding-top: 5vh; overflow: hidden; overscroll-behavior: none; perspective: 1500px;
    }
    
    /* AKICI ARKA PLAN */
    .stars-bg {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        background: radial-gradient(circle at center, #0b132b 0%, #03060d 100%);
        pointer-events: none;
    }
    .stars-layer {
        position: absolute; width: 200vw; height: 200vh; top: -50vh; left: -50vw;
        background-image: 
            radial-gradient(2px 2px at 10% 20%, #ffffff, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 30% 50%, rgba(255,255,255,0.8), rgba(0,0,0,0)),
            radial-gradient(3px 3px at 40% 10%, #ffde59, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 80% 30%, rgba(255,255,255,0.8), rgba(0,0,0,0));
        background-size: 150px 150px; animation: slowSpin 120s linear infinite; opacity: 0.7;
    }
    @keyframes slowSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* STAR WARS HYPERSPACE (IŞINLANMA) EFEKTİ */
    .warp-speed .stars-layer { 
        animation: hyperDrive 1.2s infinite ease-in !important; 
        filter: blur(1px); 
    }
    @keyframes hyperDrive { 
        0% { transform: scale(1); opacity: 0; } 
        50% { opacity: 1; }
        100% { transform: scale(15); opacity: 0; } 
    }

    /* ASTEROİT KONTEYNERİ */
    #asteroid-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; overflow: hidden; }
    .meteor { position: absolute; font-size: 3em; animation: streak linear infinite; text-shadow: 0 0 20px #ff5000; }
    @keyframes streak { 0% { transform: translate(100vw, -20vh) rotate(-45deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translate(-20vw, 120vh) rotate(-45deg); opacity: 0; } }

    /* ÇERÇEVESİZ ANA KONTEYNER */
    .container {
        background: transparent; border: none; box-shadow: none;
        max-width: 950px; width: 95%; position: relative; z-index: 10;
        max-height: 90vh; overflow-y: auto; overflow-x: hidden; box-sizing: border-box;
        transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .hide-container { opacity: 0; transform: scale(0.5) translateY(-500px); pointer-events: none; }

    /* BAŞLIK VE RÜTBE BÖLÜMÜ */
    h1 {
        text-align: center; color: #5bc0be; font-size: 2.2em; 
        text-shadow: 0 0 15px rgba(91,192,190,0.8), 2px 2px 5px #000;
        margin-bottom: 5px; letter-spacing: 2px; user-select: none;
    }
    .rank-display {
        text-align: center; font-size: 1.2em; color: #ffde59; margin-bottom: 15px;
        text-shadow: 0 0 10px #ffde59, 2px 2px 4px #000; font-weight: bold;
    }
    .captain { 
        text-align: center; font-size: 1.1em; margin-bottom: 25px; color: #fff; 
        display: flex; justify-content: center; align-items: center; gap: 10px; 
        text-shadow: 2px 2px 5px #000;
    }
    .avatar { font-size: 1.6em; cursor: pointer; transition: transform 0.2s; user-select: none; }
    .avatar:active { transform: scale(0.8); }
    .captain-input {
        background: transparent; border: none; border-bottom: 2px dashed #5bc0be;
        color: #fff; font-size: 1.1em; font-family: inherit; text-align: center;
        width: 150px; outline: none; font-weight: bold; text-shadow: 2px 2px 5px #000;
    }

    /* GÜN SEÇİCİ VE YAKIT */
    .day-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
    .day-btn {
        background-color: rgba(11, 19, 43, 0.6); border: 1px solid rgba(91, 192, 190, 0.4); 
        color: #fff; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 0.9em; transition: all 0.3s; 
    }
    .active-day { background-color: rgba(91, 192, 190, 0.9); color: #03060d; font-weight: bold; box-shadow: 0 0 15px #5bc0be; }
    
    .fuel-container { width: 100%; height: 12px; background-color: rgba(0,0,0,0.5); border-radius: 10px; margin-bottom: 25px; border: 1px solid rgba(91, 192, 190, 0.3); overflow: hidden; position: relative; }
    .fuel-bar { height: 100%; width: 0%; background-color: #5bc0be; border-radius: 8px; transition: width 0.6s ease, background-color 0.5s; }
    .fuel-text { position: absolute; width: 100%; text-align: center; top: -2px; font-size: 0.75em; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px #000; pointer-events: none;}

    /* TABLO VE DEĞİŞTİRİLEBİLİR GÖREVLER */
    .table-responsive { width: 100%; overflow-x: auto; padding-right: 5px; }
    table { width: 100%; min-width: 400px; border-collapse: collapse; background-color: transparent; }
    th, td { padding: 18px 10px; text-align: left; border-bottom: 1px dashed rgba(91, 192, 190, 0.2); font-size: 1.1em; vertical-align: middle; text-shadow: 0 0 8px #000, 0 0 15px rgba(0,0,0,0.8); }
    th { color: #5bc0be; font-weight: bold; text-transform: uppercase; font-size: 0.85em; border-bottom: 2px solid rgba(91, 192, 190, 0.5); }
    .center-text { text-align: center; }
    
    .editable-task {
        background: rgba(255,255,255,0.05); border: 1px dashed transparent; border-radius: 5px; padding: 5px;
        transition: border 0.3s, background 0.3s; outline: none; display: inline-block; min-width: 120px;
    }
    .editable-task:hover, .editable-task:focus { border: 1px dashed #5bc0be; background: rgba(91, 192, 190, 0.1); cursor: text; }

    /* UZAYLI VE YILDIZ */
    .log-cell { display: flex; align-items: center; gap: 10px; }
    .alien-icon { font-size: 1.8em; transition: transform 0.4s; }
    .task-text { opacity: 0.5; font-style: italic; font-size: 0.9em; transition: opacity 0.4s, color 0.4s; }
    .alien-awake { transform: scale(1.3) translateY(-2px); }
    .text-revealed { opacity: 1; font-style: normal; font-weight: bold; color: #ffde59; text-shadow: 0 0 10px rgba(255, 222, 89, 0.8); }

    .single-star { font-size: 3em; color: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.3s; display: inline-block; user-select: none; }
    .single-star:active { transform: scale(0.8); }
    /* pointer-events: none silindi ki geri tıklanabilsin */
    .star-lit { color: #ffde59; text-shadow: 0 0 25px #ffde59, 0 0 45px #ffde59; transform: scale(1.1); }

    /* TEBRİK MESAJI (Tıklanabilir) */
    .congrats-message {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: #ffde59; font-size: 2.8em; font-weight: bold; text-align: center; width: 100%;
        text-shadow: 0 0 20px #ffde59, 0 0 40px #ffde59, 3px 3px 10px #000; z-index: 9999;
        opacity: 0; pointer-events: none; transition: opacity 1s ease-in; cursor: pointer;
    }
    .congrats-active { opacity: 1; pointer-events: auto; }

    /* DİNAMİK EASTER EGG NESNESİ */
    #easter-ufo { position: fixed; font-size: 4em; z-index: 9999; pointer-events: none; top: -200px; left: -200px; }
    #ufo-emoji { display: inline-block; animation: wobble 0.6s ease-in-out infinite alternate; }
    @keyframes wobble { 0% { transform: translateY(-10px) rotate(-5deg); } 100% { transform: translateY(10px) rotate(5deg); } }

    @media (max-width: 500px) { .single-star { font-size: 2.4em; } h1 { font-size: 1.8em; } }
    ::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(91, 192, 190, 0.3); border-radius: 10px; }
</style>
</head>
<body>

<div class="stars-bg" id="bg-stars"><div class="stars-layer"></div></div>
<div id="asteroid-field"></div>
<div id="easter-ufo"><div id="ufo-emoji">🛸</div></div>

<div class="container" id="main-container">
    <h1>🚀 GALAKTİK MACERA 🌌</h1>
    
    <div class="rank-display" id="rank-badge">🥉 Çaylak Yolcu (0 XP)</div>

    <div class="captain">
        <span class="avatar" id="avatar" onclick="changeAvatar(event)">👨‍🚀</span>
        Kaptan: <input type="text" id="captain-name" class="captain-input" placeholder="Adını Yaz..." autocomplete="off" onchange="saveData()">
    </div>

    <div class="day-selector" id="day-buttons">
        <button class="day-btn" id="btn-Pazartesi" onclick="loadDay('Pazartesi')">Pazartesi</button>
        <button class="day-btn" id="btn-Salı" onclick="loadDay('Salı')">Salı</button>
        <button class="day-btn" id="btn-Çarşamba" onclick="loadDay('Çarşamba')">Çarşamba</button>
        <button class="day-btn" id="btn-Perşembe" onclick="loadDay('Perşembe')">Perşembe</button>
        <button class="day-btn" id="btn-Cuma" onclick="loadDay('Cuma')">Cuma</button>
        <button class="day-btn" id="btn-Cumartesi" onclick="loadDay('Cumartesi')">Cumartesi</button>
        <button class="day-btn" id="btn-Pazar" onclick="loadDay('Pazar')">Pazar</button>
    </div>

    <div class="fuel-container">
        <div class="fuel-bar" id="fuelBar"></div>
        <div class="fuel-text" id="fuelText">%0 YAKIT BAŞLATILIYOR</div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Görev Modülü</th>
                    <th>Günlük</th>
                    <th class="center-text">Onay</th>
                </tr>
            </thead>
            <tbody id="task-list"></tbody>
        </table>
    </div>
</div>

<div class="congrats-message" id="congrats" onclick="resetToHome()">
    <span id="congrats-text">GÖREV TAMAMLANDI!</span>
</div>

<script>
    // --- SES MOTORU ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playBeep(freq, type, duration, vol) {
        if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function playStarSound() { initAudio(); playBeep(880, 'sine', 0.15, 0.1); setTimeout(() => playBeep(1200, 'sine', 0.3, 0.1), 100); }
    function playWarpSound() { initAudio(); playBeep(200, 'sawtooth', 3.0, 0.1); setTimeout(() => playBeep(100, 'square', 4.0, 0.2), 200); }
    function playUfoSound() { initAudio(); playBeep(500, 'sine', 1.0, 0.1); setTimeout(() => playBeep(700, 'sine', 1.0, 0.1), 150); }

    // --- EASTER EGG: RASTGELE UZAY NESNELERİ ---
    const spaceObjects = ["🛸", "🚀", "☄️", "🛰️", "👨‍🚀"];
    let clickCount = 0; let clickTimer;
    document.addEventListener('click', (e) => {
        if(e.target.closest('button') || e.target.closest('.single-star') || e.target.closest('input') || e.target.closest('.editable-task') || e.target.closest('#congrats')) return;
        clickCount++; clearTimeout(clickTimer);
        if(clickCount === 3) { triggerDynamicObject(); clickCount = 0; } 
        else { clickTimer = setTimeout(() => { clickCount = 0; }, 1500); }
    });

    function triggerDynamicObject() {
        playUfoSound();
        const obj = document.getElementById('easter-ufo');
        const emoji = document.getElementById('ufo-emoji');
        emoji.innerText = spaceObjects[Math.floor(Math.random() * spaceObjects.length)];
        
        const w = window.innerWidth; const h = window.innerHeight;
        const startFromLeft = Math.random() > 0.5;
        const startX = startFromLeft ? -150 : w + 150; const endX = startFromLeft ? w + 150 : -150;
        const startY = Math.random() * h; const endY = Math.random() * h;
        let angle = Math.atan2(endY - startY, endX - startX) * (180 / Math.PI);
        let flip = Math.abs(angle) > 90 ? "scaleY(-1)" : "";
        
        obj.style.transition = 'none'; obj.style.left = startX + 'px'; obj.style.top = startY + 'px'; obj.style.transform = `rotate(${angle}deg) ${flip}`;
        void obj.offsetWidth;
        obj.style.transition = 'left 3.5s linear, top 3.5s linear'; obj.style.left = endX + 'px'; obj.style.top = endY + 'px';
    }

    // --- HAFIZA (LOCAL STORAGE) VE RÜTBE SİSTEMİ ---
    let appData = {
        captainName: "",
        xp: 0,
        tasks: {
            "Pazartesi": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Salı": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Çarşamba": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Perşembe": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Cuma": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Cumartesi": ["Ödev", "Kitap Okuma", "İngilizce"],
            "Pazar": ["Ödev", "Kitap Okuma", "İngilizce"]
        },
        completed: {
            "Pazartesi": [false, false, false], "Salı": [false, false, false], "Çarşamba": [false, false, false],
            "Perşembe": [false, false, false], "Cuma": [false, false, false], "Cumartesi": [false, false, false], "Pazar": [false, false, false]
        }
    };

    const ranks = [
        { min: 0, title: "🥉 Çaylak Yolcu" },
        { min: 5, title: "🥈 Uzay Kaşifi" },
        { min: 12, title: "🥇 Yıldız Savaşçısı" },
        { min: 21, title: "🎖️ Galaksi Komutanı" } 
    ];

    function loadData() {
        let saved = localStorage.getItem('galaktikData');
        if(saved) { appData = JSON.parse(saved); }
        document.getElementById('captain-name').value = appData.captainName;
        updateRank();
    }

    function saveData() {
        appData.captainName = document.getElementById('captain-name').value;
        localStorage.setItem('galaktikData', JSON.stringify(appData));
        updateRank();
    }

    function updateRank() {
        let currentRank = ranks[0].title;
        for(let r of ranks) { if(appData.xp >= r.min) currentRank = r.title; }
        document.getElementById('rank-badge').innerText = `${currentRank} (${appData.xp} XP)`;
    }

    let currentDay = "Pazartesi";

    function loadDay(dayName) {
        currentDay = dayName;
        document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active-day'));
        document.getElementById('btn-' + dayName).classList.add('active-day');

        const tbody = document.getElementById('task-list');
        tbody.innerHTML = '';
        
        let dayTasks = appData.tasks[dayName];
        let dayCompleted = appData.completed[dayName];

        dayTasks.forEach((taskName, index) => {
            let isDone = dayCompleted[index];
            let starClass = isDone ? "single-star star-lit" : "single-star";
            let starChar = isDone ? "★" : "★";
            let alienStr = isDone ? "👽⚡" : "👽💤";
            let textStr = isDone ? "Tamamlandı" : "Bekleniyor...";
            let textClass = isDone ? "task-text text-revealed" : "task-text";
            let alienClass = isDone ? "alien-icon alien-awake" : "alien-icon";

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><div class="editable-task" contenteditable="true" onblur="updateTaskName('${dayName}', ${index}, this)">${taskName}</div></td>
                <td>
                    <div class="log-cell">
                        <span class="${alienClass}">${alienStr}</span>
                        <span class="${textClass}">${textStr}</span>
                    </div>
                </td>
                <td class="center-text"><span class="${starClass}" onclick="completeTask('${dayName}', ${index}, this)">${starChar}</span></td>
            `;
            tbody.appendChild(tr);
        });
        
        updateFuelBarUI();
    }

    function updateTaskName(dayName, index, element) {
        appData.tasks[dayName][index] = element.innerText.trim() || "Görev";
        saveData();
    }

    function updateFuelBarUI() {
        let doneCount = appData.completed[currentDay].filter(x => x).length;
        let percentage = (doneCount / 3) * 100;
        const fuelBar = document.getElementById('fuelBar');
        fuelBar.style.width = percentage + "%";
        
        if(percentage === 0) {
            document.getElementById('fuelText').innerText = "GÖREVE HAZIRLAN";
            fuelBar.style.backgroundColor = "#5bc0be"; fuelBar.style.boxShadow = "0 0 15px #5bc0be";
        } else if(percentage === 100) {
            document.getElementById('fuelText').innerText = "IŞIK HIZINA GEÇİLDİ!";
            fuelBar.style.backgroundColor = "#ffde59"; fuelBar.style.boxShadow = "0 0 25px #ffde59";
        } else {
            document.getElementById('fuelText').innerText = "%" + Math.round(percentage) + " YAKIT YÜKLENDİ";
            fuelBar.style.backgroundColor = "#5bc0be"; fuelBar.style.boxShadow = "0 0 15px #5bc0be";
        }
    }

    // --- GÖREV TAMAMLAMA VE GERİ ALMA (TOGGLE) ---
    function completeTask(dayName, index, clickedStar) {
        let isDone = appData.completed[dayName][index];
        let row = clickedStar.closest('tr');
        let alien = row.querySelector('.alien-icon');
        let textSpan = row.querySelector('.task-text');

        if (isDone) {
            // Görevi Geri Al
            appData.completed[dayName][index] = false;
            appData.xp -= 1;
            
            clickedStar.classList.remove('star-lit');
            alien.innerText = '👽💤'; 
            alien.classList.remove('alien-awake');
            textSpan.innerText = 'Bekleniyor...'; 
            textSpan.classList.remove('text-revealed');
        } else {
            // Görevi Tamamla
            playStarSound(); 
            appData.completed[dayName][index] = true;
            appData.xp += 1; 
            
            clickedStar.classList.add('star-lit'); 
            alien.innerText = '👽⚡'; 
            alien.classList.add('alien-awake');
            textSpan.innerText = 'Tamamlandı'; 
            textSpan.classList.add('text-revealed');
        }

        saveData();
        updateFuelBarUI();

        // Eğer 3 görev de tamamlandıysa Işık Hızına geç
        if (appData.completed[dayName].filter(x => x).length === 3) {
            setTimeout(triggerWarpSpeed, 800); 
        }
    }

    // --- ASTEROİT YAĞMURU VE IŞIK HIZI (WARP) ---
    let meteorInterval;
    function triggerWarpSpeed() {
        playWarpSound();
        document.getElementById('bg-stars').classList.add('warp-speed');
        document.getElementById('main-container').classList.add('hide-container');
        
        const field = document.getElementById('asteroid-field');
        field.innerHTML = ''; 
        
        meteorInterval = setInterval(() => {
            let m = document.createElement('div');
            m.className = 'meteor';
            m.innerText = '☄️';
            m.style.top = (Math.random() * 100) + 'vh';
            m.style.animationDuration = (Math.random() * 0.4 + 0.2) + 's'; // Asteroitler artık daha hızlı
            field.appendChild(m);
            setTimeout(() => m.remove(), 1000);
        }, 80); // Daha yoğun asteroit

        let capName = appData.captainName.trim().toUpperCase() || "KAPTAN";
        document.getElementById('congrats-text').innerHTML = `GÖREV TAMAMLANDI<br>${capName}! 🌌`;
        
        setTimeout(() => { document.getElementById('congrats').classList.add('congrats-active'); }, 2000);
    }

    // --- ANA EKRANA DÖNÜŞ ---
    function resetToHome() {
        clearInterval(meteorInterval);
        document.getElementById('asteroid-field').innerHTML = '';
        document.getElementById('bg-stars').classList.remove('warp-speed');
        document.getElementById('congrats').classList.remove('congrats-active');
        
        setTimeout(() => {
            document.getElementById('main-container').classList.remove('hide-container');
            loadDay(currentDay); 
        }, 500);
    }

    // Avatar Değiştirme
    const avatars = ["👨‍🚀", "👩‍🚀", "👽", "🤖", "👾"];
    let avatarIdx = 0;
    function changeAvatar(e) { e.stopPropagation(); avatarIdx = (avatarIdx + 1) % avatars.length; document.getElementById('avatar').innerText = avatars[avatarIdx]; }

    window.onload = () => { 
        loadData();
        loadDay('Pazartesi'); 
        document.body.addEventListener('touchstart', initAudio, { once: true });
        document.body.addEventListener('click', initAudio, { once: true });
    };
</script>

</body>
</html>
